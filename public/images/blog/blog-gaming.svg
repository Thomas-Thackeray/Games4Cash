<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c1121f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Glow orb -->
  <circle cx="400" cy="210" r="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#e63946" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="70" x2="800" y2="70"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="133" y1="0" x2="133" y2="420"/>
    <line x1="266" y1="0" x2="266" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="533" y1="0" x2="533" y2="420"/>
    <line x1="666" y1="0" x2="666" y2="420"/>
  </g>

  <!-- Controller body -->
  <g transform="translate(400,210)">
    <!-- Main body -->
    <path d="M-130,-50 C-130,-70 -110,-85 -85,-85 L85,-85 C110,-85 130,-70 130,-50 L130,40 C130,80 95,105 60,105 L-60,105 C-95,105 -130,80 -130,40 Z"
          fill="#1a1a2e" stroke="#e63946" stroke-opacity="0.4" stroke-width="2"/>

    <!-- Left grip -->
    <path d="M-130,20 C-140,20 -165,30 -165,70 C-165,100 -145,120 -120,120 L-90,120 L-90,105 L-60,105 L-60,40 L-130,40 Z"
          fill="#1a1a2e" stroke="#e63946" stroke-opacity="0.4" stroke-width="2"/>

    <!-- Right grip -->
    <path d="M130,20 C140,20 165,30 165,70 C165,100 145,120 120,120 L90,120 L90,105 L60,105 L60,40 L130,40 Z"
          fill="#1a1a2e" stroke="#e63946" stroke-opacity="0.4" stroke-width="2"/>

    <!-- D-pad left -->
    <rect x="-118" y="-15" width="22" height="10" rx="2" fill="#e63946" opacity="0.8"/>
    <rect x="-108" y="-25" width="10" height="30" rx="2" fill="#e63946" opacity="0.8"/>

    <!-- Face buttons -->
    <circle cx="85" cy="-30" r="10" fill="none" stroke="#e63946" stroke-width="2" opacity="0.9"/>
    <text x="85" y="-26" text-anchor="middle" fill="#e63946" font-size="10" opacity="0.9">▲</text>

    <circle cx="105" cy="-10" r="10" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
    <text x="105" y="-6" text-anchor="middle" fill="#ff6b6b" font-size="12" opacity="0.9">○</text>

    <circle cx="65" cy="-10" r="10" fill="none" stroke="#6bcfff" stroke-width="2" opacity="0.9"/>
    <text x="65" y="-5" text-anchor="middle" fill="#6bcfff" font-size="11" opacity="0.9">✕</text>

    <circle cx="85" cy="10" r="10" fill="none" stroke="#a8ff78" stroke-width="2" opacity="0.9"/>
    <text x="85" y="14" text-anchor="middle" fill="#a8ff78" font-size="10" opacity="0.9">■</text>

    <!-- Center logo -->
    <circle cx="0" cy="-10" r="18" fill="url(#accent)" opacity="0.9"/>
    <text x="0" y="-4" text-anchor="middle" fill="white" font-size="16" font-weight="bold">◈</text>

    <!-- L/R bumpers -->
    <rect x="-130" y="-95" width="55" height="18" rx="9" fill="#e63946" opacity="0.5"/>
    <rect x="75" y="-95" width="55" height="18" rx="9" fill="#e63946" opacity="0.5"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="100" cy="50" r="3" fill="#e63946" opacity="0.3"/>
  <circle cx="120" cy="70" r="2" fill="#e63946" opacity="0.2"/>
  <circle cx="700" cy="350" r="4" fill="#e63946" opacity="0.3"/>
  <circle cx="680" cy="370" r="2" fill="#e63946" opacity="0.2"/>

  <!-- Label -->
  <text x="400" y="370" text-anchor="middle" fill="#e63946" opacity="0.5" font-family="'Outfit', sans-serif" font-size="11" letter-spacing="3">GAMING</text>
</svg>
