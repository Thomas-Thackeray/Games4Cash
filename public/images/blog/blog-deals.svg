<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0c0c18"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd60a"/>
      <stop offset="100%" style="stop-color:#e6a800"/>
    </linearGradient>
    <linearGradient id="coinside" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b38600"/>
      <stop offset="100%" style="stop-color:#8a6500"/>
    </linearGradient>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="coinglow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Warm glow -->
  <ellipse cx="400" cy="210" rx="250" ry="200" fill="#ffd60a" opacity="0.04" filter="url(#softblur)"/>
  <ellipse cx="280" cy="240" rx="120" ry="100" fill="#e63946" opacity="0.05" filter="url(#softblur)"/>

  <!-- Pound sign big background watermark -->
  <text x="400" y="290" text-anchor="middle" fill="white" opacity="0.025" font-family="sans-serif" font-size="300" font-weight="900">£</text>

  <!-- Coins stack -->
  <!-- Coin 3 (back) -->
  <g transform="translate(340,260)">
    <ellipse cx="0" cy="12" rx="65" ry="16" fill="url(#coinside)" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="65" ry="16" fill="url(#coin)" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#8a6500" font-size="16" font-weight="700" opacity="0.6">£</text>
  </g>

  <!-- Coin 2 (middle) -->
  <g transform="translate(340,225)" filter="url(#coinglow)">
    <ellipse cx="0" cy="14" rx="70" ry="18" fill="url(#coinside)"/>
    <ellipse cx="0" cy="0" rx="70" ry="18" fill="url(#coin)" opacity="0.75"/>
    <ellipse cx="0" cy="0" rx="58" ry="14" fill="none" stroke="#ffd60a" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" fill="#6b4e00" font-size="18" font-weight="700">£</text>
  </g>

  <!-- Coin 1 (front top) -->
  <g transform="translate(340,185)" filter="url(#coinglow)">
    <ellipse cx="0" cy="16" rx="75" ry="20" fill="url(#coinside)"/>
    <ellipse cx="0" cy="0" rx="75" ry="20" fill="url(#coin)"/>
    <ellipse cx="0" cy="0" rx="63" ry="16" fill="none" stroke="#ffe566" stroke-width="2" opacity="0.7"/>
    <text x="0" y="7" text-anchor="middle" fill="#5a3d00" font-size="22" font-weight="700">£</text>
  </g>

  <!-- Price tag -->
  <g transform="translate(540,185)">
    <!-- Tag shape -->
    <path d="M-75,-55 L75,-55 L75,55 L-60,55 L-75,35 Z" fill="#1a1a2e" stroke="#e63946" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M-75,-55 L75,-55 L75,-35 L-75,-35 Z" fill="#e63946" opacity="0.8"/>
    <!-- String hole -->
    <circle cx="55" cy="35" r="6" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.5"/>
    <!-- Was price -->
    <text x="0" y="-41" text-anchor="middle" fill="white" font-family="'Outfit', sans-serif" font-size="11" font-weight="600" letter-spacing="1">CASH OFFER</text>
    <!-- Main price -->
    <text x="0" y="15" text-anchor="middle" fill="white" font-family="'Outfit', sans-serif" font-size="34" font-weight="700">£35</text>
    <!-- Condition -->
    <text x="0" y="40" text-anchor="middle" fill="#e63946" opacity="0.8" font-family="'Outfit', sans-serif" font-size="9" letter-spacing="1">COMPLETE IN CASE</text>
  </g>

  <!-- Up arrow trend -->
  <g transform="translate(185,210)" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="-60,60 -20,20 20,40 60,-30"/>
    <polyline points="40,-40 60,-30 70,-10"/>
  </g>
  <circle cx="245" cy="180" r="5" fill="#4ade80"/>

  <!-- Small floating coins -->
  <g opacity="0.4">
    <ellipse cx="160" cy="150" rx="18" ry="5" fill="url(#coin)"/>
    <text x="160" y="153" text-anchor="middle" fill="#6b4e00" font-size="6" font-weight="700">£</text>
    <ellipse cx="640" cy="300" rx="14" ry="4" fill="url(#coin)"/>
    <text x="640" y="303" text-anchor="middle" fill="#6b4e00" font-size="5" font-weight="700">£</text>
    <ellipse cx="130" cy="310" rx="20" ry="6" fill="url(#coin)"/>
    <text x="130" y="313" text-anchor="middle" fill="#6b4e00" font-size="7" font-weight="700">£</text>
  </g>

  <text x="400" y="385" text-anchor="middle" fill="#ffd60a" opacity="0.3" font-family="'Outfit', sans-serif" font-size="10" letter-spacing="4">DEALS &amp; PRICES</text>
</svg>
