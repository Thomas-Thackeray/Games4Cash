<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0a0a18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c1121f"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="400" cy="180" rx="250" ry="150" fill="#e63946" opacity="0.07" filter="url(#blur)"/>

  <!-- Signal/broadcast waves -->
  <g transform="translate(400,160)" fill="none" stroke="#e63946" stroke-linecap="round">
    <path d="M0,0 m-30,0 a30,30 0 0,1 60,0" stroke-width="3" opacity="0.8"/>
    <path d="M0,0 m-55,0 a55,55 0 0,1 110,0" stroke-width="2.5" opacity="0.6"/>
    <path d="M0,0 m-80,0 a80,80 0 0,1 160,0" stroke-width="2" opacity="0.4"/>
    <path d="M0,0 m-105,0 a105,105 0 0,1 210,0" stroke-width="1.5" opacity="0.25"/>
    <path d="M0,0 m-130,0 a130,130 0 0,1 260,0" stroke-width="1" opacity="0.15"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.9"/>
  </g>

  <!-- Breaking news bar -->
  <rect x="0" y="310" width="800" height="60" fill="#e63946" opacity="0.1"/>
  <rect x="0" y="310" width="800" height="3" fill="#e63946" opacity="0.5"/>

  <!-- LIVE badge -->
  <rect x="140" y="326" width="55" height="26" rx="4" fill="#e63946"/>
  <text x="167" y="344" text-anchor="middle" fill="white" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" letter-spacing="1">LIVE</text>
  <!-- Pulse dot -->
  <circle cx="150" cy="339" r="4" fill="white" opacity="0.9"/>

  <!-- Headline bars -->
  <rect x="210" y="330" width="280" height="8" rx="4" fill="white" opacity="0.2"/>
  <rect x="500" y="330" width="160" height="8" rx="4" fill="white" opacity="0.1"/>
  <rect x="210" y="348" width="180" height="6" rx="3" fill="white" opacity="0.12"/>

  <!-- News ticker bottom -->
  <rect x="0" y="376" width="800" height="44" fill="#0d0d20"/>
  <rect x="0" y="376" width="800" height="2" fill="#e63946" opacity="0.3"/>
  <rect x="0" y="376" width="130" height="44" fill="#e63946" opacity="0.8"/>
  <text x="65" y="403" text-anchor="middle" fill="white" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" letter-spacing="1">GAMING NEWS</text>
  <rect x="140" y="389" width="460" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="615" y="389" width="160" height="6" rx="3" fill="white" opacity="0.08"/>

  <!-- Calendar icon -->
  <g transform="translate(280,230)">
    <rect x="-45" y="-45" width="90" height="90" rx="10" fill="#1a1a2e" stroke="#e63946" stroke-opacity="0.4" stroke-width="1.5"/>
    <rect x="-45" y="-45" width="90" height="28" rx="10" fill="#e63946" opacity="0.7"/>
    <rect x="-45" y="-28" width="90" height="10" fill="#e63946" opacity="0.7"/>
    <!-- Pins -->
    <rect x="-20" y="-52" width="8" height="16" rx="4" fill="#e63946"/>
    <rect x="12" y="-52" width="8" height="16" rx="4" fill="#e63946"/>
    <!-- Date grid -->
    <g fill="white" opacity="0.7" font-family="'Outfit',sans-serif" font-size="9">
      <text x="-30" y="5">M</text><text x="-15" y="5">T</text><text x="0" y="5">W</text><text x="13" y="5">T</text><text x="27" y="5">F</text>
      <text x="-30" y="18">1</text><text x="-15" y="18">2</text><text x="0" y="18">3</text><text x="13" y="18">4</text><text x="27" y="18">5</text>
      <text x="-30" y="31">8</text><text x="-15" y="31">9</text>
    </g>
    <circle cx="13" cy="24" r="9" fill="#e63946" opacity="0.9"/>
    <text x="13" y="28" text-anchor="middle" fill="white" font-family="'Outfit',sans-serif" font-size="10" font-weight="700">10</text>
  </g>

  <!-- Megaphone -->
  <g transform="translate(530,230)">
    <path d="M-20,0 L20,-30 L20,30 Z" fill="#e63946" opacity="0.8"/>
    <rect x="-50" y="-18" width="35" height="36" rx="6" fill="#1a1a2e" stroke="#e63946" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M20,10 L40,25" stroke="#e63946" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <path d="M20,-10 L40,-25" stroke="#e63946" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- Sound waves -->
    <path d="M28,-6 Q40,0 28,6" fill="none" stroke="#e63946" stroke-width="2" opacity="0.4"/>
    <path d="M36,-10 Q52,0 36,10" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.25"/>
  </g>

  <text x="400" y="50" text-anchor="middle" fill="white" opacity="0.06" font-family="sans-serif" font-size="80" font-weight="900">NEWS</text>
</svg>
