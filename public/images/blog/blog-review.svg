<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#0c0c1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Bg glow -->
  <ellipse cx="400" cy="210" rx="300" ry="180" fill="#e63946" opacity="0.05" filter="url(#softblur)"/>

  <!-- Score display - large -->
  <g transform="translate(400,170)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#e63946" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#e63946" stroke-width="1" opacity="0.1"/>

    <!-- Score arc (9/10 = 324 degrees) -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#e63946" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="540 600" stroke-dashoffset="150" opacity="0.9" filter="url(#glow)"/>

    <!-- Background arc -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#ffffff" stroke-width="12"
            stroke-dasharray="598 600" stroke-dashoffset="150" opacity="0.04"/>

    <!-- Inner fill -->
    <circle cx="0" cy="0" r="80" fill="#1a1a2e" opacity="0.8"/>

    <!-- Score text -->
    <text x="0" y="-12" text-anchor="middle" fill="white" font-family="'Outfit', sans-serif" font-size="52" font-weight="700">9</text>
    <text x="0" y="18" text-anchor="middle" fill="#e63946" font-family="'Outfit', sans-serif" font-size="14" opacity="0.8">/10</text>
    <text x="0" y="40" text-anchor="middle" fill="white" font-family="'Outfit', sans-serif" font-size="9" opacity="0.4" letter-spacing="2">SCORE</text>
  </g>

  <!-- Stars row -->
  <g transform="translate(400,310)">
    <g fill="#e63946" font-size="22" text-anchor="middle" font-family="sans-serif">
      <text x="-88" y="0">★</text>
      <text x="-44" y="0">★</text>
      <text x="0" y="0">★</text>
      <text x="44" y="0">★</text>
      <text x="88" y="0" opacity="0.25">★</text>
    </g>
  </g>

  <!-- Review criteria bars -->
  <g transform="translate(100,120)">
    <g font-family="'Outfit', sans-serif" font-size="10" fill="white" opacity="0.5">
      <text x="0" y="0">GAMEPLAY</text>
      <rect x="80" y="-11" width="120" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="80" y="-11" width="114" height="8" rx="4" fill="#e63946" opacity="0.9"/>

      <text x="0" y="28">GRAPHICS</text>
      <rect x="80" y="17" width="120" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="80" y="17" width="102" height="8" rx="4" fill="#e63946" opacity="0.7"/>

      <text x="0" y="56">STORY</text>
      <rect x="80" y="45" width="120" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="80" y="45" width="96" height="8" rx="4" fill="#e63946" opacity="0.6"/>

      <text x="0" y="84">SOUND</text>
      <rect x="80" y="73" width="120" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="80" y="73" width="108" height="8" rx="4" fill="#e63946" opacity="0.75"/>

      <text x="0" y="112">VALUE</text>
      <rect x="80" y="101" width="120" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="80" y="101" width="90" height="8" rx="4" fill="#e63946" opacity="0.55"/>
    </g>
  </g>

  <!-- Review criteria bars right -->
  <g transform="translate(580,120)">
    <g font-family="'Outfit', sans-serif" font-size="10" fill="white" opacity="0.5">
      <text x="0" y="0">REPLAYABILITY</text>
      <rect x="100" y="-11" width="100" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="100" y="-11" width="80" height="8" rx="4" fill="#e63946" opacity="0.65"/>

      <text x="0" y="28">PERFORMANCE</text>
      <rect x="100" y="17" width="100" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="100" y="17" width="95" height="8" rx="4" fill="#e63946" opacity="0.78"/>

      <text x="0" y="56">ONLINE</text>
      <rect x="100" y="45" width="100" height="8" rx="4" fill="#1a1a2e"/>
      <rect x="100" y="45" width="70" height="8" rx="4" fill="#e63946" opacity="0.5"/>
    </g>
  </g>

  <text x="400" y="395" text-anchor="middle" fill="#e63946" opacity="0.4" font-family="'Outfit', sans-serif" font-size="10" letter-spacing="4">GAME REVIEW</text>
</svg>
